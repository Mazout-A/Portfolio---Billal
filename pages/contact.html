<!DOCTYPE html>

<html lang="fr">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Contactez Billal Boudlal - en recherche d'alternance dès août 2026." />
  <meta property="og:title" content="Contact - Billal Boudlal" />
  <meta property="og:description" content="Contactez Billal Boudlal - en recherche d'alternance dès août 2026." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="../assets/icon/logo_boudlal_billal.svg" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <title>Contact - Billal Boudlal</title>

  <link rel="stylesheet" href="../css/base.css" />

  <link rel="stylesheet" href="../css/header.css" />

  <link rel="stylesheet" href="../css/footer.css" />

  <link rel="stylesheet" href="../css/buttons.css" />

  <link rel="stylesheet" href="../css/cards.css" />

  <link rel="stylesheet" href="../css/sections.css" />

  <link rel="stylesheet" href="../css/animations.css" />

  <link rel="stylesheet" href="../css/responsive.css" />
</head>

<body class="page-wrapper">

  <header class="header" role="banner">

    <a href="../index.html" class="header_logo">

      <img src="../assets/icon/logo_boudlal_billal.svg" alt="Logo Billal Boudlal" width="38" height="48" />

    </a>

    <nav class="header_nav" id="header-nav" role="navigation" aria-label="Navigation principale">

      <a href="apropos.html" class="header_link">À propos</a>

      <a href="projets.html" class="header_link">Projets</a>

      <a href="contact.html" class="header_cta" aria-current="page">Contact</a>

    </nav>

    <button class="header_burger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="header-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <main id="contenu-principal">

    <div class="page-title">

      <h1 class="page-title_text">Contacte-moi</h1>

      <hr class="page-title_line" />

    </div>

    <section class="section section--tight">

      <div class="contact-grid">

        <aside class="card card--rouge contact-accroche fade-in">

          <div class="contact-accroche_top">

            <h2 class="contact-accroche_title">Tu cherches<br />un alternant ?</h2>

            <p class="contact-accroche_sub">Remplis ce formulaire, je te réponds sous <strong>24h</strong>.</p>

            <p class="contact-accroche_alt">Tu préfères passer directement par LinkedIn ou par email ? Les liens sont en
              bas de page.</p>

          </div>

          <div class="contact-accroche_bottom">

            <p class="contact-accroche_label">Disponible dès</p>

            <p class="contact-accroche_value">Août 2026</p>

          </div>

        </aside>

        <div class="card fade-in fade-in-delay-1">

          <form class="contact-form"
            action="https://script.google.com/macros/s/AKfycbzWxT9WQjgOMEyyz2ulU4JvsKXylzIuF5Q4RuTKyORg75ZoHBqz_gaDtXL49j888D9FCw/exec"
            novalidate id="contact-form">

            <div>

              <label for="nom" class="sr-only">Prénom et Nom</label>

              <input class="form-input" type="text" id="nom" name="nom" placeholder="Prénom et Nom" autocomplete="name"
                required />

            </div>

            <div class="form-row">

              <div>

                <label for="email" class="sr-only">Adresse e-mail</label>

                <input class="form-input" type="email" id="email" name="email" placeholder="Votre e-mail"
                  autocomplete="email" required />

              </div>

              <div>

                <label for="entreprise" class="sr-only">Nom de l'entreprise</label>

                <input class="form-input" type="text" id="entreprise" name="entreprise" placeholder="Entreprise"
                  autocomplete="organization" />

              </div>

            </div>

            <div>

              <label for="sujet" class="sr-only">Sujet</label>

              <select class="form-select" id="sujet" name="sujet" required>

                <option value="" disabled selected>Sujet</option>

                <option value="Proposition alternance">Proposition d'alternance</option>

                <option value="Proposition stage">Proposition de stage</option>

                <option value="Collaboration/Devis">Collaboration / projet</option>

                <option value="Autre">Autre</option>

              </select>

            </div>

            <div>

              <label for="message" class="sr-only">Votre message</label>

              <textarea class="form-textarea" id="message" name="message"
                placeholder="Parle-moi de ton entreprise, du poste, du rythme d'alternance souhaité..."
                required></textarea>

            </div>

            <div class="form-submit">

              <button type="submit" class="btn btn--primary" id="btn-submit">
                Envoyer
                <img class="btn_arrow" src="../assets/icon/arrow.svg" alt="" />

              </button>

            </div>

          </form>

        </div>

      </div>

    </section>

  </main>

  <footer class="footer" role="contentinfo">

    <a href="mailto:Billalboudlal.pro@gmail.com" class="footer_mail">Billalboudlal.pro@gmail.com</a>

    <div class="footer_bottom">

      <div class="footer_separator"></div>

      <div class="footer_socials">

        <div class="footer_logo"><a href="../index.html" class="footer_social-link"><img
              src="../assets/icon/logo_boudlal_billal.svg" alt="Logo" /></a></div>

        <a href="https://github.com/Mazout-A" class="footer_social-link" target="_blank" rel="noopener"><img
            src="../assets/icon/Github.svg" alt="GitHub" /></a>

        <a href="https://www.linkedin.com/in/billal-boudlal-a6442933a/" class="footer_social-link" target="_blank"
          rel="noopener"><img src="../assets/icon/linkedin.svg" alt="LinkedIn" /></a>

      </div>

      <nav class="footer_mentions" role="navigation" aria-label="Mentions légales">

        <a href="#" class="footer_mention-link">Mention légale</a>

        <span>© 2026 Boudlal Billal</span>

      </nav>

    </div>

  </footer>

  <script src="../js/app.js"></script>

  <script>
    const contactForm = document.getElementById('contact-form');
    const submitBtn = document.getElementById('btn-submit');

    contactForm.addEventListener('submit', function (e) {
      e.preventDefault();

      submitBtn.disabled = true;
      const originalContent = submitBtn.innerHTML; // On garde l'icône flèche en mémoire
      submitBtn.textContent = "Envoi en cours...";

      const formData = new FormData(contactForm);
      const url = 'https://script.google.com/macros/s/AKfycbzWxT9WQjgOMEyyz2ulU4JvsKXylzIuF5Q4RuTKyORg75ZoHBqz_gaDtXL49j888D9FCw/exec';

      fetch(url, {
        method: 'POST',
        body: formData,
        mode: 'no-cors' // Google Apps Script nécessite souvent 'no-cors' pour le fetch direct
      })
        .then(() => {
          alert('Merci Billal ! Ton message a bien été envoyé et classé dans ton Gmail.');
          contactForm.reset();
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalContent;
        })
        .catch(error => {
          console.error('Erreur:', error);
          alert('Oups, il y a eu un problème lors de l\'envoi.');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalContent;
        });
    });
  </script>

</body>

</html>
